<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIO 40A Lab Quiz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>BIO 40A — Week 3 Lab Quiz</h1>
        <div class="header-controls">
            <div class="mode-toggle">
                <button id="btn-teacher" class="mode-btn active" onclick="setMode('teacher')">Teacher Mode</button>
                <button id="btn-student" class="mode-btn" onclick="setMode('student')">Student Mode</button>
            </div>
        </div>
    </header>

    <nav class="image-tabs">
        <button class="tab active" data-image="cell_model">The Cell</button>
        <button class="tab" data-image="skin_diagram">Skin Diagram</button>
        <button class="tab" data-image="skin_model">Skin Model</button>
        <button class="tab" data-image="mitosis_stages">Mitosis</button>
    </nav>

    <main>
        <div class="workspace">
            <div class="image-viewport" id="image-viewport">
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomIn()" title="Zoom in">+</button>
                    <span class="zoom-level" id="zoom-level">100%</span>
                    <button class="zoom-btn" onclick="zoomOut()" title="Zoom out">&minus;</button>
                    <button class="zoom-btn zoom-fit" onclick="zoomReset()" title="Fit to view">Fit</button>
                </div>
                <div class="image-container" id="image-container">
                    <img id="main-image" src="images/cell_model.jpeg" alt="Lab image" draggable="false">
                    <svg id="lines-layer" xmlns="http://www.w3.org/2000/svg"></svg>
                    <div id="markers-layer"></div>
                </div>
            </div>

            <div class="sidebar">
                <div class="instructions" id="instructions">
                    <h3>Teacher Mode</h3>
                    <p>1. Tap the image to place a marker<br>
                       2. Drag a term onto the marker (or tap term, then tap marker)<br>
                       3. Tap X to remove a marker<br>
                       4. Use +/- or pinch to zoom, drag to pan<br>
                       5. Save when done</p>
                </div>

                <div class="word-bank" id="word-bank">
                    <h3>Word Bank</h3>
                    <div id="word-list"></div>
                </div>

                <div class="actions">
                    <button id="btn-save" class="action-btn save-btn" onclick="saveAnswerKey()">Save Answer Key</button>
                    <button id="btn-submit" class="action-btn submit-btn" onclick="submitAnswers()" style="display:none;">Submit Answers</button>
                    <button id="btn-reset" class="action-btn reset-btn" onclick="resetCurrent()">Reset</button>
                    <button id="btn-export" class="action-btn data-btn" onclick="exportData()">Export Data</button>
                    <button id="btn-import" class="action-btn data-btn" onclick="document.getElementById('import-file').click()">Import Data</button>
                    <input type="file" id="import-file" accept="application/json,.json" style="display:none;" onchange="importData(event)">
                </div>

                <div id="results" class="results" style="display:none;"></div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
